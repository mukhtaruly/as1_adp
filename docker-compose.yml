version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: as2-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: orders_db
    ports:
      - "5435:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  order-service:
    build: ./order-service
    depends_on:
      - postgres
      - rabbitmq
    ports:
      - "8081:8081"

  payment-service:
    build: ./payment-service
    depends_on:
      - postgres
      - rabbitmq
    ports:
      - "8082:8082"

  notification-service:
    build: ./notification-service
    depends_on:
      - rabbitmq

volumes:
  postgres_data: